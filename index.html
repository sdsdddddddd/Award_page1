<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>認定ホール | ハカセさんぽ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <img src="images/hero-bg.png" alt="" class="curtain-img">
    <div class="sparkles" aria-hidden="true"></div>
    <div class="light-flares" aria-hidden="true"></div>

    <div class="fixed-sparkles">
      <div class="fixed-sparkles-inner">
        <!-- Cloud Sparkles -->
        <img src="images/sparkle-cloud.png" alt="" class="hero-sparkle hero-sparkle-left">
        <img src="images/sparkle-cloud.png" alt="" class="hero-sparkle hero-sparkle-left-extra">
        <img src="images/sparkle-cloud.png" alt="" class="hero-sparkle hero-sparkle-left-mid">
        <img src="images/sparkle-cloud.png" alt="" class="hero-sparkle hero-sparkle-left-outer">
        
        <img src="images/sparkle-cloud.png" alt="" class="hero-sparkle hero-sparkle-right">
        <img src="images/sparkle-cloud.png" alt="" class="hero-sparkle hero-sparkle-right-mid">
        <img src="images/sparkle-cloud.png" alt="" class="hero-sparkle hero-sparkle-right-outer">
        <img src="images/sparkle-cloud.png" alt="" class="hero-sparkle hero-sparkle-right-extra">
        <img src="images/sparkle-cloud.png" alt="" class="hero-sparkle hero-sparkle-right-extra-two">

        <!-- Individual Twinkling Star Sparkles (Randomized) -->
        <!-- Left Side & Top -->
        <img src="images/sparkle-star.png" alt="" class="twinkle-star" style="top: 15%; left: -10%; width: 7%; --rot: 12deg; animation-delay: 0.5s; animation-duration: 3s;">
        <img src="images/sparkle-star.png" alt="" class="twinkle-star" style="top: 35%; left: -25%; width: 4%; --rot: 45deg; animation-delay: 1.2s; animation-duration: 4s;">
        <img src="images/sparkle-star.png" alt="" class="twinkle-star" style="top: 50%; left: -35%; width: 8%; --rot: 80deg; animation-delay: 0.1s; animation-duration: 2.5s;">
        <img src="images/sparkle-star.png" alt="" class="twinkle-star" style="top: 25%; left: -30%; width: 5%; --rot: -20deg; animation-delay: 2s; animation-duration: 3.5s;">
        <img src="images/sparkle-star.png" alt="" class="twinkle-star" style="top: 60%; left: -15%; width: 6%; --rot: 110deg; animation-delay: 0.8s; animation-duration: 4.2s;">
        <img src="images/sparkle-star.png" alt="" class="twinkle-star" style="top: 45%; left: -5%; width: 9%; --rot: -45deg; animation-delay: 1.5s; animation-duration: 3s;">
        <img src="images/sparkle-star.png" alt="" class="twinkle-star" style="top: 5%; left: 10%; width: 3%; --rot: 60deg; animation-delay: 2.5s; animation-duration: 3.8s;">
        <img src="images/sparkle-star.png" alt="" class="twinkle-star" style="top: 65%; left: -28%; width: 5%; --rot: -10deg; animation-delay: 0.3s; animation-duration: 2.8s;">

        <!-- Right Side & Top -->
        <img src="images/sparkle-star.png" alt="" class="twinkle-star" style="top: 20%; right: -15%; width: 6%; --rot: 25deg; animation-delay: 1.1s; animation-duration: 3.2s;">
        <img src="images/sparkle-star.png" alt="" class="twinkle-star" style="top: 40%; right: -30%; width: 4%; --rot: -55deg; animation-delay: 0.4s; animation-duration: 4.1s;">
        <img src="images/sparkle-star.png" alt="" class="twinkle-star" style="top: 55%; right: -40%; width: 9%; --rot: 15deg; animation-delay: 2.2s; animation-duration: 2.9s;">
        <img src="images/sparkle-star.png" alt="" class="twinkle-star" style="top: 30%; right: -25%; width: 5%; --rot: 90deg; animation-delay: 0.7s; animation-duration: 3.6s;">
        <img src="images/sparkle-star.png" alt="" class="twinkle-star" style="top: 65%; right: -20%; width: 7%; --rot: -30deg; animation-delay: 1.8s; animation-duration: 4.5s;">
        <img src="images/sparkle-star.png" alt="" class="twinkle-star" style="top: 5%; right: 20%; width: 8%; --rot: 75deg; animation-delay: 0.2s; animation-duration: 3.1s;">
        <img src="images/sparkle-star.png" alt="" class="twinkle-star" style="top: 50%; right: -10%; width: 3%; --rot: -15deg; animation-delay: 2.7s; animation-duration: 3.9s;">
        <img src="images/sparkle-star.png" alt="" class="twinkle-star" style="top: 25%; right: -5%; width: 5%; --rot: 40deg; animation-delay: 1.4s; animation-duration: 2.7s;">
      </div>
    </div>

            </a>

        </article>

        <article class="hall-card">

              <span class="hall-badge-text">認定</span>
            </div>
            <div class="hall-photo">

        <article class="hall-card">
          <div class="hall-card-frame">
            <div class="hall-badge">
              <img src="images/badge-frame.png" alt="" class="hall-badge-img">
              <span class="hall-badge-text">認定</span>
            </div>
            <div class="hall-photo">
              <img src="images/halls/hall-05.svg" alt="グランドオータ888鳴海店 外観">
            </div>
            <div class="hall-name"><span class="hall-name-text">グランドオータ888鳴海店</span></div>
            <a href="#" class="hall-btn">
              <span>店舗情報</span>

            </a>
          </div>
        </article>

        <article class="hall-card">
          <div class="hall-card-frame">
            <div class="hall-badge">
              <img src="images/badge-frame.png" alt="" class="hall-badge-img">
              <span class="hall-badge-text">認定</span>
            </div>
            <div class="hall-photo">
              <img src="images/halls/hall-06.svg" alt="ヴィーナスギャラリー姫路I店 外観">

            <div class="hall-name"><span class="hall-name-text">ヴィーナスギャラリー姫路I店</span></div>

      </main>
